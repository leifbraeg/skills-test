name: Security Scan Skills

on:
  push:
    branches: [main]
    paths:
      - 'skills/**'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get changed skill folders
        id: changed-skills
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            SKILLS=$(ls -d skills/*/ 2>/dev/null | xargs -n1 basename | tr '\n' ' ' | xargs)
          else
            git fetch origin ${{ github.event.before }}:prev-commit 2>/dev/null || true
            SKILLS=$(git diff --name-only ${{ github.event.before }}..HEAD -- skills/ 2>/dev/null | grep -o '^skills/[^/]*' | sort -u | xargs -n1 basename || (ls -d skills/*/ 2>/dev/null | xargs -n1 basename))
          fi
          echo "skills=$SKILLS" >> $GITHUB_OUTPUT

      - name: Scan skills with VirusTotal
        env:
          VT_API_KEY: ${{ secrets.VIRUSTOTAL_API_KEY }}
        run: |
          if [ -z "$VT_API_KEY" ]; then
            echo "⚠️  VirusTotal API key not configured. Skipping scans."
            exit 0
          fi

          SKILLS="${{ steps.changed-skills.outputs.skills }}"
          echo "Scanning skills: $SKILLS"

          for skill in $SKILLS; do
            SKILL_PATH="skills/$skill"
            if [ ! -d "$SKILL_PATH" ]; then
              echo "⚠️  Skill folder not found: $SKILL_PATH"
              continue
            fi

            echo "📦 Scanning: $skill"

            # Create temporary zip of skill folder
            ZIP_FILE="/tmp/${skill}.skill"
            cd "$SKILL_PATH"
            zip -r -q "$ZIP_FILE" . -x '.git/*' '.gitignore' 'node_modules/*'
            cd - > /dev/null

            # Upload to VirusTotal
            RESPONSE=$(curl -s -X POST \
              -H "x-apikey: $VT_API_KEY" \
              -F "file=@$ZIP_FILE" \
              "https://www.virustotal.com/api/v3/files")

            FILE_ID=$(echo "$RESPONSE" | jq -r '.data.id // empty')
            if [ -z "$FILE_ID" ]; then
              echo "❌ Failed to upload $skill to VirusTotal"
              echo "Response: $RESPONSE"
              continue
            fi

            # Wait for analysis to complete and get SHA-256 hash
            sleep 2
            ANALYSIS=$(curl -s -H "x-apikey: $VT_API_KEY" \
              "https://www.virustotal.com/api/v3/analyses/$FILE_ID")

            FILE_HASH=$(echo "$ANALYSIS" | jq -r '.meta.file_info.sha256 // empty')
            if [ -z "$FILE_HASH" ]; then
              echo "❌ Could not get file hash from analysis"
              continue
            fi

            REPORT_URL="https://www.virustotal.com/gui/file/$FILE_HASH/details"

            echo "✅ Scanned $skill: $REPORT_URL"

            # Update skill.json with report URL
            SKILL_JSON="$SKILL_PATH/skill.json"
            if [ -f "$SKILL_JSON" ]; then
              # Use jq to update the JSON, creating the field if it doesn't exist
              jq ".virustotalReportUrl = \"$REPORT_URL\" | .virustotalScanDate = \"$(date -u +'%Y-%m-%dT%H:%M:%SZ')\"" "$SKILL_JSON" > "${SKILL_JSON}.tmp"
              mv "${SKILL_JSON}.tmp" "$SKILL_JSON"
            fi

            rm -f "$ZIP_FILE"
          done

      - name: Commit scan results
        run: |
          if git diff --quiet skills/*/skill.json; then
            echo "ℹ️  No changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add skills/*/skill.json
          git commit -m "chore: update VirusTotal security scan results"
          git push

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Security scans completed. Results will appear in the skills library once merged.'
            })
